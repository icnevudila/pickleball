<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PISTA — Live Court Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B1512;
    --panel:#122019;
    --panel-alt:#16271F;
    --line: rgba(243,239,227,.10);
    --line-strong: rgba(243,239,227,.26);
    --paper:#F4EFE3;
    --text:#F3F1E6;
    --muted:#90A39A;
    --dim:#4C615A;
    --lime:#C8FF4D;
    --coral:#FF6A4D;
    --teal-deep:#0E3B36;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--ink);color:var(--text);
    font-family:"Space Grotesk",ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;user-select:none;}

  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;
    background:
      radial-gradient(ellipse 60% 50% at 100% 0%, rgba(255,106,77,.10), transparent 60%),
      radial-gradient(ellipse 70% 60% at 0% 100%, rgba(200,255,77,.06), transparent 60%);
  }

  .num{font-family:"Oswald",ui-sans-serif,sans-serif;font-variant-numeric:tabular-nums;}
  .eyebrow{font:600 10px/1 "Space Grotesk",sans-serif;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}

  .board{height:100vh;display:grid;grid-template-rows:auto 1fr auto;padding:20px;gap:16px;}

  @keyframes riseIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

  /* ---------- HEADER ---------- */
  header.head{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;
    border-bottom:1px solid var(--line);animation:riseIn .6s ease both;}

  .brand{display:flex;align-items:baseline;gap:14px;}
  .brand .word{background:var(--coral);color:var(--ink);display:inline-block;padding:7px 16px;
    font:800 26px/1 "Oswald",sans-serif;letter-spacing:.02em;text-transform:uppercase;transform:skewX(-6deg);}
  .brand .tagline{font:600 10px/1 "Space Grotesk",sans-serif;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);}

  .head-right{display:flex;align-items:center;gap:26px;}

  .live-pill{display:inline-flex;align-items:center;gap:8px;background:var(--lime);color:var(--ink);
    padding:7px 12px;font:800 10px/1 "Space Grotesk",sans-serif;letter-spacing:.16em;text-transform:uppercase;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--ink);}
  .live-pill .dot{animation:pulse 1.3s ease-in-out infinite;}

  .clock-block{text-align:right;}
  .clock-block .clock{font:700 26px/1 "Oswald",sans-serif;letter-spacing:.01em;margin-top:4px;}

  .btn-ghost{background:transparent;border:1px solid var(--line-strong);color:var(--text);height:38px;padding:0 14px;
    font:600 10px "Space Grotesk",sans-serif;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;}
  .btn-ghost:hover{border-color:var(--lime);color:var(--lime);}

  /* ---------- MAIN ---------- */
  main.main{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:16px;min-height:0;}

  .courts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:repeat(2,minmax(0,1fr));gap:14px;min-height:0;}

  .court{position:relative;background:var(--panel);border:1px solid var(--line);display:grid;
    grid-template-rows:auto auto 1fr auto auto;min-height:0;overflow:hidden;animation:riseIn .6s ease both;}
  .court:nth-child(1){animation-delay:.05s;} .court:nth-child(2){animation-delay:.12s;}
  .court:nth-child(3){animation-delay:.19s;} .court:nth-child(4){animation-delay:.26s;}

  .court-flag{position:absolute;top:13px;right:-34px;background:var(--lime);color:var(--ink);
    padding:4px 40px;transform:rotate(38deg);font:800 9px "Oswald",sans-serif;letter-spacing:.14em;
    text-transform:uppercase;box-shadow:0 4px 14px rgba(0,0,0,.35);}

  .court-head{background:var(--teal-deep);display:flex;align-items:center;gap:10px;padding:12px 14px;min-width:0;}
  .court-name{font:700 13px "Oswald",sans-serif;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;flex:1;}
  .match-type{font:600 9px "Space Grotesk",sans-serif;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    white-space:nowrap;}

  .timer-row{display:flex;align-items:center;justify-content:flex-end;padding:8px 14px 0;}
  .timer{font:700 clamp(18px,1.8vw,24px) "Oswald",sans-serif;color:var(--lime);font-variant-numeric:tabular-nums;}

  .team-body{display:flex;align-items:center;gap:8px;}
  .team-b .team-body{flex-direction:row-reverse;justify-content:flex-end;}
  .avatar-stack{display:flex;flex:0 0 auto;}
  .avatar{width:26px;height:26px;border-radius:50%;background:var(--panel-alt);border:1.5px solid var(--line-strong);
    display:flex;align-items:center;justify-content:center;font:700 9px "Oswald",sans-serif;color:var(--text);flex:0 0 auto;}
  .avatar + .avatar{margin-left:-9px;}
  .team-a .avatar{border-color:var(--coral);}
  .team-b .avatar{border-color:var(--lime);}

  .score-row{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;
    gap:clamp(10px,1.2vw,20px);padding:6px clamp(14px,1.4vw,20px) 4px;}

  .team{min-width:0;}
  .team-b{text-align:right;}
  .team-label{display:flex;align-items:center;gap:6px;font:700 9px "Space Grotesk",sans-serif;letter-spacing:.16em;
    text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .team-b .team-label{justify-content:flex-end;}
  .chip{width:7px;height:7px;background:currentColor;}
  .team-a .team-label{color:var(--coral);}
  .team-b .team-label{color:var(--lime);}
  .team-names{font:600 clamp(12px,1.05vw,15px)/1.25 "Space Grotesk",sans-serif;letter-spacing:.02em;text-transform:uppercase;overflow-wrap:anywhere;}

  .score{display:flex;align-items:center;justify-content:center;gap:clamp(8px,1vw,14px);white-space:nowrap;
    background:var(--panel-alt);border-radius:6px;padding:4px clamp(10px,1.2vw,18px);}
  .score .num{font-weight:700;font-style:italic;font-size:clamp(40px,4.6vw,72px);line-height:.85;
    letter-spacing:-.01em;display:inline-block;}
  .score .sep{color:var(--dim);font-size:clamp(16px,1.4vw,22px);font-weight:300;}

  .sets-row{display:flex;align-items:center;gap:8px;padding:10px 14px;flex-wrap:wrap;}
  .set-box{font:700 11px "Oswald",sans-serif;border:1px solid var(--line-strong);color:var(--muted);padding:3px 8px;}
  .set-box.current{background:var(--lime);color:var(--ink);border-color:var(--lime);}
  .sets-label{font:700 9px "Space Grotesk",sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-right:4px;}

  .live-track{border-top:1px solid var(--line);padding:6px 10px;min-height:92px;}
  .live-track svg{display:block;width:100%;height:100%;}
  .playerBody{filter:drop-shadow(0 0 6px rgba(243,241,230,.12));}
  .p1{animation:p1Move 4.8s ease-in-out infinite;}
  .p2{animation:p2Move 4.8s ease-in-out infinite;}
  .bat1{transform-origin:47px 68px;animation:bat1Swing 4.8s ease-in-out infinite;}
  .bat2{transform-origin:253px 46px;animation:bat2Swing 4.8s ease-in-out infinite;}
  .ballMove{animation:ballMove 4.8s cubic-bezier(.45,.05,.55,.95) infinite;}
  @keyframes p1Move{0%,100%{transform:translate(0,0);}25%{transform:translate(0,-18px);}50%{transform:translate(9px,0);}75%{transform:translate(0,18px);}}
  @keyframes p2Move{0%,100%{transform:translate(0,0);}25%{transform:translate(0,20px);}50%{transform:translate(-9px,0);}75%{transform:translate(0,-16px);}}
  @keyframes bat1Swing{0%,100%{transform:rotate(38deg);}18%{transform:rotate(70deg);}34%{transform:rotate(-45deg);}50%{transform:rotate(16deg);}76%{transform:rotate(-35deg);}}
  @keyframes bat2Swing{0%,100%{transform:rotate(-8deg);}22%{transform:rotate(45deg);}36%{transform:rotate(-62deg);}54%{transform:rotate(0deg);}82%{transform:rotate(37deg);}}
  @keyframes ballMove{0%,100%{transform:translate(0,0);}25%{transform:translate(168px,-12px);}50%{transform:translate(0,0);}75%{transform:translate(168px,-52px);}}

  /* ---------- SIDEBAR ---------- */
  aside.side{display:grid;grid-template-rows:auto auto 1fr;gap:14px;min-height:0;}

  .alert{position:relative;background:var(--panel);border:1px solid var(--coral);padding:14px;overflow:hidden;
    animation:riseIn .6s ease both .1s;}
  .alert-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .alert-label{color:var(--coral);}
  .tag-danger{font:800 9px "Space Grotesk",sans-serif;letter-spacing:.14em;background:var(--coral);color:var(--ink);padding:3px 7px;}
  .alert-main{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
  .alert-main strong{font:700 16px "Oswald",sans-serif;text-transform:uppercase;letter-spacing:.01em;}
  .alert-sub{font:500 10px "Space Grotesk",sans-serif;color:var(--muted);}

  .panel{background:var(--panel);border:1px solid var(--line);display:flex;flex-direction:column;min-height:0;
    animation:riseIn .6s ease both .16s;}
  .panel-grow{flex:1;animation-delay:.22s;}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--teal-deep);}
  .panel-head h3{margin:0;font:700 10px "Space Grotesk",sans-serif;letter-spacing:.18em;text-transform:uppercase;color:var(--text);}
  .count{font:700 11px "Oswald",sans-serif;color:var(--ink);background:var(--lime);padding:2px 7px;}

  .next-item{padding:12px 14px;border-bottom:1px solid var(--line);position:relative;animation:riseIn .5s ease both;}
  .next-item:nth-child(1){animation-delay:.55s;} .next-item:nth-child(2){animation-delay:.62s;} .next-item:nth-child(3){animation-delay:.69s;}
  .next-item:first-child{background:rgba(200,255,77,.06);}
  .next-item:first-child::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:3px;background:var(--lime);
    animation:barPulse 1.4s ease-in-out infinite;}
  .next-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .next-meta .eyebrow{color:var(--dim);}
  .prepare{font:800 9px "Space Grotesk",sans-serif;letter-spacing:.1em;text-transform:uppercase;color:var(--lime);}
  .versus{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:8px;align-items:center;
    font:700 12px "Space Grotesk",sans-serif;letter-spacing:.02em;text-transform:uppercase;}
  .versus span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .versus span:last-child{text-align:right;}
  .vs{color:var(--dim);font:800 9px "Oswald",sans-serif;text-align:center;}

  .wait-body{overflow:hidden;padding:6px;flex:1;}
  .wait-row{display:grid;grid-template-columns:28px minmax(0,1fr) auto;gap:10px;align-items:center;padding:9px 8px;
    animation:riseIn .5s ease both;}
  .wait-row:nth-child(1){animation-delay:.6s;} .wait-row:nth-child(2){animation-delay:.66s;}
  .wait-row:nth-child(3){animation-delay:.72s;} .wait-row:nth-child(4){animation-delay:.78s;}
  .wait-row:nth-child(5){animation-delay:.84s;} .wait-row:nth-child(6){animation-delay:.9s;}
  .wait-row:nth-child(odd){background:rgba(243,239,227,.025);}
  @keyframes barPulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .pos{color:var(--dim);text-align:right;font:700 11px "Oswald",sans-serif;}
  .wait-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font:600 12px "Space Grotesk",sans-serif;letter-spacing:.02em;text-transform:uppercase;}
  .type{color:var(--muted);border:1px solid var(--line-strong);padding:3px 6px;font:700 9px "Space Grotesk",sans-serif;letter-spacing:.08em;}

  /* ---------- FOOTER ---------- */
  footer.ticker-wrap{background:var(--paper);color:var(--ink);overflow:hidden;animation:riseIn .6s ease both .3s;}
  .ticker{display:flex;align-items:center;gap:40px;white-space:nowrap;padding:11px 0;padding-left:100vw;
    animation:ticker 32s linear infinite;font:600 11px "Space Grotesk",sans-serif;letter-spacing:.05em;}
  .ticker .tagchip{padding:2px 8px;margin-right:7px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;font-size:9px;}
  .t-live{background:var(--lime);color:var(--ink);} .t-alert{background:var(--coral);color:var(--ink);} .t-info{background:var(--teal-deep);color:var(--paper);}

  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.7);}}
  @keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-100%);}}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;}
  }

  @media (max-width:1180px){
    body{overflow:auto;}
    .board{height:auto;min-height:100vh;overflow:visible;}
    main.main{grid-template-columns:1fr;grid-template-rows:auto auto;}
    aside.side{grid-template-rows:none;grid-template-columns:repeat(3,minmax(0,1fr));}
    .score .num{font-size:clamp(36px,6vw,60px);}
  }

  @media (max-width:820px){
    .courts{grid-template-columns:1fr;grid-template-rows:none;}
    .court{min-height:240px;}
    .btn-ghost{display:none;}
    .brand .tagline{display:none;}
    aside.side{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
  <div class="board">
    <header class="head">
      <div class="brand">
        <div class="word">PISTA</div>
        <div class="tagline">Live Court Status</div>
      </div>
      <div class="head-right">
        <span class="live-pill"><span class="dot"></span>LIVE</span>
        <div class="clock-block">
          <div class="eyebrow">Local time</div>
          <div class="clock" id="clock">00:00:00</div>
        </div>
        <button class="btn-ghost" id="fullscreenBtn">Fullscreen</button>
      </div>
    </header>

    <main class="main">
      <section class="courts" id="courts"></section>

      <aside class="side">
        <section class="alert">
          <div class="alert-row">
            <span class="eyebrow alert-label">Capacity</span>
            <span class="tag-danger">FULL</span>
          </div>
          <div class="alert-main">
            <strong>No open courts</strong>
            <span class="alert-sub">Next opening ~14 min</span>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><h3>Up next</h3><span class="count" id="upNextCount">0</span></div>
          <div id="upNext"></div>
        </section>

        <section class="panel panel-grow">
          <div class="panel-head"><h3>Waitlist</h3><span class="count" id="waitCount">0</span></div>
          <div class="wait-body" id="waitlist"></div>
        </section>
      </aside>
    </main>

    <footer class="ticker-wrap">
      <div class="ticker" id="ticker"></div>
    </footer>
  </div>

<script>
  const courts = [
    { id:1, name:"COURT 01 · CENTER", type:"MEN'S DOUBLES", seconds: 12*60+45, live:true, delay:"0s",
      teamA:{ names:["ALEX R.","DANIEL K."], score:10 }, teamB:{ names:["MARK S.","JOSH P."], score:8 },
      sets:[{a:11,b:7}] },
    { id:2, name:"COURT 02", type:"MIXED DOUBLES", seconds: 8*60+20, live:true, delay:"-1.1s",
      teamA:{ names:["ZOE T.","EMMA A."], score:5 }, teamB:{ names:["BRAD C.","CHAD Y."], score:11 },
      sets:[{a:9,b:11}] },
    { id:3, name:"COURT 03", type:"WOMEN'S DOUBLES", seconds: 14*60+10, live:true, delay:"-2.3s",
      teamA:{ names:["LISA M.","ANNA K."], score:4 }, teamB:{ names:["JANE D.","MARY S."], score:9 },
      sets:[{a:6,b:11}] },
    { id:4, name:"COURT 04", type:"MEN'S SINGLES", seconds: 3*60+55, live:true, delay:"-3.4s",
      teamA:{ names:["DAVID B."], score:11 }, teamB:{ names:["CHRIS W."], score:10 },
      sets:[] },
  ];

  const upNext = [
    { targetCourt:"COURT 04", a:"SARAH & MIKE", b:"JOHN & DOE" },
    { targetCourt:"COURT 02", a:"OLIVIA & ETHAN", b:"WAITING OPPONENT" },
  ];

  const waitlist = [
    { pos:3, name:"LIAM T. & NOAH S.", type:"DBL" },
    { pos:4, name:"LUCAS K.", type:"SGL" },
    { pos:5, name:"MIA Y. & AVA D.", type:"DBL" },
    { pos:6, name:"OLIVER B.", type:"SGL" },
    { pos:7, name:"ELLA R. & GRACE W.", type:"DBL" },
    { pos:8, name:"HENRY C.", type:"SGL" },
  ];

  const tickerItems = [
    { tag:"LIVE", cls:"t-live", text:"Court 4 match ended: Daniel / Alex win 11–9." },
    { tag:"ALERT", cls:"t-alert", text:"Winter tournament registration closes at 22:00." },
    { tag:"INFO", cls:"t-info", text:"All courts are currently active." },
    { tag:"QUEUE", cls:"t-info", text:"Olivia & Ethan prepare for Court 2." },
    { tag:"LIVE", cls:"t-live", text:"Broadcast terminal running clean." },
  ];

  function esc(v){
    return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
  }
  function fmt(sec){
    const m = Math.floor(sec/60), s = sec%60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  function namesHtml(names){ return names.map(n=>`<div>${esc(n)}</div>`).join(''); }
  function initials(name){
    return name.replace('.', '').split(' ').filter(Boolean).map(w => w[0]).join('').slice(0,2).toUpperCase();
  }
  function avatarsHtml(names){
    return `<div class="avatar-stack">${names.map(n => `<div class="avatar">${esc(initials(n))}</div>`).join('')}</div>`;
  }

  function liveTrackSvg(delay){
    return `
      <svg viewBox="0 0 300 120" preserveAspectRatio="none" aria-hidden="true">
        <rect x="20" y="10" width="260" height="100" rx="6" fill="var(--panel-alt)" stroke="var(--line-strong)" stroke-width="1.2"/>
        <line x1="150" y1="10" x2="150" y2="110" stroke="var(--line-strong)" stroke-dasharray="5 5"/>
        <line x1="110" y1="10" x2="110" y2="110" stroke="var(--line)"/>
        <line x1="190" y1="10" x2="190" y2="110" stroke="var(--line)"/>
        <line x1="20" y1="60" x2="110" y2="60" stroke="var(--line)"/>
        <line x1="190" y1="60" x2="280" y2="60" stroke="var(--line)"/>
        <rect x="20" y="10" width="90" height="100" fill="var(--coral)" opacity=".06"/>
        <rect x="190" y="10" width="90" height="100" fill="var(--lime)" opacity=".06"/>

        <g class="p1" style="animation-delay:${delay}">
          <g class="bat1" style="animation-delay:${delay}">
            <line x1="45" y1="66" x2="55" y2="72" stroke="rgba(243,241,230,.85)" stroke-width="1.7"/>
            <ellipse cx="58" cy="75" rx="3.4" ry="7.5" fill="var(--ink)" stroke="var(--coral)" stroke-width="1.8" transform="rotate(-30 58 75)"/>
          </g>
          <line x1="45" y1="54" x2="52" y2="50" stroke="rgba(243,241,230,.78)" stroke-width="1.6"/>
          <rect class="playerBody" x="38" y="52" width="9" height="17" rx="3.5" fill="var(--coral)"/>
          <circle cx="42" cy="60" r="5.4" fill="var(--text)"/>
        </g>

        <g class="p2" style="animation-delay:${delay}">
          <g class="bat2" style="animation-delay:${delay}">
            <line x1="255" y1="44" x2="245" y2="38" stroke="rgba(243,241,230,.85)" stroke-width="1.7"/>
            <ellipse cx="242" cy="35" rx="3.4" ry="7.5" fill="var(--ink)" stroke="var(--lime)" stroke-width="1.8" transform="rotate(-30 242 35)"/>
          </g>
          <line x1="255" y1="56" x2="248" y2="60" stroke="rgba(243,241,230,.78)" stroke-width="1.6"/>
          <rect class="playerBody" x="254" y="42" width="9" height="17" rx="3.5" fill="var(--lime)"/>
          <circle cx="258" cy="50" r="5.4" fill="var(--text)"/>
        </g>

        <circle cx="58" cy="75" r="3.6" fill="var(--text)" class="ballMove" style="animation-delay:${delay};filter:drop-shadow(0 0 5px var(--lime));"/>
      </svg>
    `;
  }

  function setsHtml(court){
    const finished = court.sets.map(s=>`<span class="set-box">${s.a}–${s.b}</span>`).join('');
    const current = `<span class="set-box current">${court.teamA.score}–${court.teamB.score}</span>`;
    const label = court.sets.length ? `<span class="sets-label">SETS</span>` : `<span class="sets-label">SCORE</span>`;
    return label + finished + current;
  }

  function renderCourts(){
    document.getElementById('courts').innerHTML = courts.map(c => `
      <article class="court">
        ${c.live ? '<div class="court-flag">LIVE</div>' : ''}
        <div class="court-head">
          <span class="court-name">${esc(c.name)}</span>
          <span class="match-type">${esc(c.type)}</span>
        </div>
        <div class="timer-row"><span class="timer num" id="timer-${c.id}">${fmt(c.seconds)}</span></div>
        <div class="score-row">
          <div class="team team-a">
            <div class="team-label"><span class="chip"></span>Team A</div>
            <div class="team-body">
              ${avatarsHtml(c.teamA.names)}
              <div class="team-names">${namesHtml(c.teamA.names)}</div>
            </div>
          </div>
          <div class="score">
            <span class="num">${c.teamA.score}</span><span class="sep">–</span><span class="num">${c.teamB.score}</span>
          </div>
          <div class="team team-b">
            <div class="team-label">Team B<span class="chip"></span></div>
            <div class="team-body">
              ${avatarsHtml(c.teamB.names)}
              <div class="team-names">${namesHtml(c.teamB.names)}</div>
            </div>
          </div>
        </div>
        <div class="sets-row">${setsHtml(c)}</div>
        <div class="live-track">${liveTrackSvg(c.delay)}</div>
      </article>
    `).join('');
  }

  function renderSidebar(){
    document.getElementById('upNextCount').textContent = upNext.length;
    document.getElementById('upNext').innerHTML = upNext.map((m,i) => `
      <div class="next-item">
        <div class="next-meta">
          <span class="eyebrow">${esc(m.targetCourt)}</span>
          ${i===0 ? '<span class="prepare">Preparing</span>' : '<span class="eyebrow">Queued</span>'}
        </div>
        <div class="versus">
          <span>${esc(m.a)}</span><span class="vs">VS</span><span>${esc(m.b)}</span>
        </div>
      </div>
    `).join('');

    document.getElementById('waitCount').textContent = waitlist.length;
    document.getElementById('waitlist').innerHTML = waitlist.map(w => `
      <div class="wait-row">
        <div class="pos">${w.pos}.</div>
        <div class="wait-name">${esc(w.name)}</div>
        <div class="type">${esc(w.type)}</div>
      </div>
    `).join('');
  }

  function renderTicker(){
    document.getElementById('ticker').innerHTML = tickerItems.map(t => `
      <span><span class="tagchip ${t.cls}">${esc(t.tag)}</span>${esc(t.text)}</span>
    `).join('');
  }

  function tickClock(){
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  }
  function tickTimers(){
    courts.forEach(c => {
      c.seconds = Math.max(0, c.seconds - 1);
      const el = document.getElementById(`timer-${c.id}`);
      if (el) el.textContent = fmt(c.seconds);
    });
  }

  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    const root = document.documentElement;
    if (!document.fullscreenElement && root.requestFullscreen) root.requestFullscreen();
    else if (document.exitFullscreen) document.exitFullscreen();
  });

  renderCourts();
  renderSidebar();
  renderTicker();
  tickClock();
  setInterval(tickClock, 1000);
  setInterval(tickTimers, 1000);
</script>
</body>
</html>
