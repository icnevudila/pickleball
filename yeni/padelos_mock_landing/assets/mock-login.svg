<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 780" width="1300" height="780" role="img" aria-label="PadelOS mockup mock-login.svg">
    
    <defs>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
        <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#8A2D16" flood-opacity="0.12"/>
      </filter>
      <linearGradient id="creamGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#FFF8F1"/>
        <stop offset="1" stop-color="#FFFFFF"/>
      </linearGradient>
      <linearGradient id="coralGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#FF724D"/>
        <stop offset="1" stop-color="#F04F2A"/>
      </linearGradient>
    </defs>
    
    <style>
  .bg { fill: #FFF8F1; }
  .screen { fill: #ffffff; stroke: #EADDD2; stroke-width: 1.5; }
  .surface { fill: #ffffff; stroke: #EADDD2; stroke-width: 1.2; }
  .surface2 { fill: #FFFDFB; stroke: #EADDD2; stroke-width: 1; }
  .ink { fill: #211A1D; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; font-weight: 750; }
  .text { fill: #211A1D; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; font-weight: 600; }
  .muted { fill: #82746D; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; font-weight: 500; }
  .tiny { font-size: 17px; }
  .small { font-size: 22px; }
  .body { font-size: 28px; }
  .h2 { font-size: 42px; letter-spacing: -1.5px; }
  .h1 { font-size: 58px; letter-spacing: -2.4px; }
  .pill { fill: #FFF1E9; stroke: #FFD8C9; stroke-width: 1; }
  .accent { fill: #F04F2A; }
  .accentDark { fill: #BF321C; }
  .amber { fill: #FFB703; }
  .green { fill: #16A34A; }
  .blue { fill: #4F77FF; }
  .line { stroke: #EADDD2; stroke-width: 1.5; }
  .soft { fill: #FFF3EA; }
  .shadow { filter: url(#shadow); }
</style>
    <rect width="1300" height="780" fill="url(#creamGrad)"/>
    <g transform="translate(50,50)"><g class="shadow"><rect x="0" y="0" width="1200" height="680" rx="30" class="screen"/><rect x="0" y="0" width="1200" height="74" rx="28" fill="#FFFDFB"/><circle cx="34" cy="35" r="8" fill="#F87171"/><circle cx="61" cy="35" r="8" fill="#FBBF24"/><circle cx="88" cy="35" r="8" fill="#22C55E"/><text x="126" y="43" class="muted tiny">Login</text><line x1="0" y1="74" x2="1200" y2="74" class="line"/><g transform="translate(0,74)"><text x="68" y="86" class="ink h2">PadelOS</text><text x="68" y="130" class="muted small">Sign in to your club workspace</text><rect x="68" y="198" width="440" height="64" rx="18" class="surface2"/><text x="96" y="238" class="muted tiny">owner@club.com</text><rect x="68" y="284" width="440" height="64" rx="18" class="surface2"/><text x="96" y="324" class="muted tiny">••••••••••</text><rect x="68" y="386" width="440" height="64" rx="32" fill="url(#coralGrad)"/><text x="288" y="427" fill="#fff" class="text small" text-anchor="middle">Continue</text><rect x="586" y="80" width="560" height="500" rx="32" class="surface"/><text x="626" y="142" class="ink h2">One login. Every court.</text><text x="626" y="184" class="muted small">Manage liveboard, bookings, queues and players from the same operating room.</text><circle cx="650" cy="256" r="11" fill="#F04F2A"/><text x="680" y="266" class="ink h2">6</text><text x="790" y="260" class="muted tiny">courts configured</text><circle cx="650" cy="348" r="11" fill="#16A34A"/><text x="680" y="358" class="ink h2">124</text><text x="790" y="352" class="muted tiny">bookings this week</text><circle cx="650" cy="440" r="11" fill="#FFB703"/><text x="680" y="450" class="ink h2">92%</text><text x="790" y="444" class="muted tiny">online payment rate</text></g></g></g>
    </svg>